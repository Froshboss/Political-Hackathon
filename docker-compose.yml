version: '3.8'

services:
  app:
    build: .
    container_name: election-dashboard-app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - AFRICASTALKING_USERNAME=${AFRICASTALKING_USERNAME:-sandbox}
      - AFRICASTALKING_API_KEY=${AFRICASTALKING_API_KEY}
      - MONGODB_URI=mongodb://mongo:27017/election_db
    depends_on:
      - mongo

  mongo:
    image: mongo:6.0
    container_name: election-dashboard-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data: