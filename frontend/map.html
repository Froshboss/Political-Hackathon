<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectionGuard - Map View</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin=""/>
    <!-- Leaflet Heatmap Plugin CSS (if any, usually not needed) -->
    <style>
        /* Custom styles for map page */
        body {
            overflow: hidden; /* Prevent main scrollbar */
        }
        .main-content {
            padding: 0; /* Remove padding for full map */
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        #map {
            flex-grow: 1;
            width: 100%;
            background-color: var(--bg-secondary); /* Fallback */
            z-index: 1;
        }
        .map-mobile-btn { display: none; }
        @media (max-width: 900px) {
            .map-mobile-btn { display: flex !important; }
        }
        /* Mobile specific map styles will be in styles.css */
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-icon">
                <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
            </div>
            <span class="logo-text">ElectionGuard</span>
        </div>
        <ul class="nav-menu">
            <li class="nav-item">
                <a href="index.html" class="nav-link">
                    <svg viewBox="0 0 24 24"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
                    Overview
                </a>
            </li>
            <li class="nav-item active">
                <a href="map.html" class="nav-link active">
                    <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
                    Map
                </a>
            </li>
            <li class="nav-item">
                <a href="incidents.html" class="nav-link">
                    <svg viewBox="0 0 24 24"><path d="M1 21h22L12 2 1 21zm12-3h-2v-2h2v2zm0-4h-2v-4h2v4z"/></svg>
                    Incident Reports
                </a>
            </li>
            <li class="nav-item">
                <a href="observers.html" class="nav-link">
                    <svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
                    Observer Management
                </a>
            </li>
        </ul>
    </aside>
    <main class="main-content">
        <button class="map-mobile-btn mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')" style="position: absolute; top: 15px; left: 15px; z-index: 1000; background: var(--bg-secondary); border-radius: 8px; padding: 8px; border: 1px solid var(--border-color); cursor: pointer;" aria-label="Toggle Menu">
            <svg viewBox="0 0 24 24" style="width: 24px; height: 24px; fill: var(--text-primary);"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        <div id="map"></div>
        <!-- Floating Stats Overlay or Mobile Details will be dynamically added/styled -->
    </main>
    <script src="/socket.io/socket.io.js"></script>
    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/4K+sazc6FlOmKMgsQoT4="
        crossorigin=""></script>
    <!-- Leaflet Heatmap Plugin JS -->
    <script src="https://unpkg.com/leaflet.heat@0.2.0/dist/leaflet-heat.js"></script>
    <script src="map.js"></script> <!-- New JS file for map logic -->
</body>
</html>
